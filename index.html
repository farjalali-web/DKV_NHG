<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DKV NHG Trainer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <p class="eyebrow">DKV NHG</p>
          <h1>Beslisboom Trainer</h1>
        </div>
        <div class="stats" aria-live="polite">
          <div>
            <span id="statDone">0</span>
            <small>casussen</small>
          </div>
          <div>
            <span id="statAvg">0%</span>
            <small>gemiddeld</small>
          </div>
          <div>
            <span id="statStreak">0</span>
            <small>streak</small>
          </div>
        </div>
        <div class="top-actions">
          <span class="ai-status" id="aiStatus">Local</span>
          <button class="icon-button" id="resetProgress" title="Reset voortgang" aria-label="Reset voortgang">
            <span aria-hidden="true">R</span>
          </button>
          <a class="source-link" href="/taal">🇳🇱 Dutch Coach</a>
          <a class="source-link" href="../dkv_nhg/DKV_NHG_Beslisbomen_2026_NL_GroteLetters.pdf">PDF</a>
        </div>
      </header>

      <section class="workspace" aria-label="DKV oefenapp">
        <aside class="case-rail">
          <div class="rail-section">
            <label for="routeFilter">Route</label>
            <select id="routeFilter"></select>
          </div>
          <div class="rail-section">
            <label for="casePicker">Casus</label>
            <select id="casePicker"></select>
          </div>
          <div class="case-box" id="caseBox"></div>
          <div class="rail-buttons">
            <button id="newCase">Nieuwe casus</button>
            <button id="showModel">Modelantwoord</button>
          </div>
        </aside>

        <section class="practice-panel">
          <div class="panel-head">
            <div>
              <p class="panel-kicker" id="routeKicker">Route</p>
              <h2 id="practiceTitle">Casus</h2>
            </div>
            <div class="score-pill" id="lastScore">Nog niet beoordeeld</div>
          </div>
          <div class="step-tabs" id="stepTabs"></div>
          <form id="practiceForm" class="response-grid"></form>

          <div class="practice-actions">
            <button type="button" id="checkAnswer">Controleer</button>
            <button type="button" id="clearAnswer">Wis selectie</button>
          </div>

          <section id="feedbackPanel" class="feedback-panel" aria-live="polite"></section>
        </section>

        <aside class="algorithm-panel">
          <div class="panel-head compact">
            <div>
              <p class="panel-kicker">Beslisboom</p>
              <h2 id="algorithmTitle">Route</h2>
            </div>
          </div>
          <div id="algorithmMap" class="algorithm-map"></div>
          <div id="sourceLinks" class="source-links"></div>
        </aside>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
